<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHU 數媒方塊挑戰賽</title>
    <style>
        body {
            background: radial-gradient(circle, #2c3e50, #0f171e);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .game-container {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 120px;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(52, 152, 219, 0.8);
            text-align: center;
        }
        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            color: #bdc3c7;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #f1c40f;
            margin-top: 5px;
        }
        canvas {
            border: 2px solid #34495e;
            background-color: #111;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            border-radius: 4px;
        }
        .controls-hint {
            margin-top: 15px;
            font-size: 12px;
            color: #7f8c8d;
            line-height: 1.6;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>TETRIS 數位媒體方塊</h1>
    
    <div class="game-container">
        <canvas id="tetris" width="240" height="480"></canvas>
        
        <div class="info-panel">
            <div class="stat-box">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">LINES</div>
                <div class="stat-value" id="lines">0</div>
            </div>
            <div class="controls-hint">
                <strong>操作說明：</strong><br>
                ← → : 左右移動<br>
                ↑ / Space : 旋轉方塊<br>
                ↓ : 加速下落
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20); // 放大 20 倍做為網格單位

        // 1. 定義 7 種經典方塊與對應的顏色代碼
        const colors = [
            null,
            '#ff003c', // 1: I (霓虹紅)
            '#00f0ff', // 2: O (青色)
            '#ffbc00', // 3: T (橘黃)
            '#9d00ff', // 4: S (紫色)
            '#00ff66', // 5: Z (綠色)
            '#ff0099', // 6: J (粉紅)
            '#3498db'  // 7: L (藍色)
        ];

        function createPiece(type) {
            if (type === 'I') {
                return [
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                ];
            } else if (type === 'O') {
                return [
                    [2, 2],
                    [2, 2],
                ];
            } else if (type === 'T') {
                return [
                    [0, 3, 0],
                    [3, 3, 3],
                    [0, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 4, 4],
                    [4, 4, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'Z') {
                return [
                    [5, 5, 0],
                    [0, 5, 5],
                    [0, 0, 0],
                ];
            } else if (type === 'J') {
                return [
                    [0, 6, 0],
                    [0, 6, 0],
                    [6, 6, 0],
                ];
            } else if (type === 'L') {
                return [
                    [0, 7, 0],
                    [0, 7, 0],
                    [0, 7, 7],
                ];
            }
        }

        // 2. 初始化遊戲地圖 (12寬 x 24高)
        const arena = createMatrix(12, 24);
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) { matrix.push(new Array(w).fill(0)); }
            return matrix;
        }

        // 3. 玩家狀態
        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
            lines: 0
        };

        // 4. 消除邏輯
        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer; // 只要有一格是空的，這行就不算消除
                    }
                }
                // 滿行消除
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row); // 在最上方補一行空行
                ++y;

                player.score += rowCount * 10;
                player.lines++;
                rowCount *= 2; // 連續消除得分加倍
            }
            updateScore();
        }

        // 5. 碰撞偵測
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] &&
                        arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        // 6. 繪製方塊（帶有簡單的質感邊框）
        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // 畫方塊內層陰影，營造立體感
                        context.fillStyle = 'rgba(255, 255, 255, 0.15)';
                        context.fillRect(x + offset.x, y + offset.y, 1, 0.08);
                        context.fillRect(x + offset.x, y + offset.y, 0.08, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#111';
            context.fillRect(0, 0, canvas.width, canvas.height);

            // 畫出網格背景線（增加視覺精緻度）
            context.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            context.lineWidth = 0.05;
            for(let i=0; i<12; i++) {
                context.beginPath(); context.moveTo(i, 0); context.lineTo(i, 24); context.stroke();
            }
            for(let j=0; j<24; j++) {
                context.beginPath(); context.moveTo(0, j); context.lineTo(12, j); context.stroke();
            }

            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        // 7. 固定方塊並生成下一個
        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        // 8. 隨機重設方塊（與 Game Over 判定）
        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            // 如果剛生成就碰撞，代表滿到頂部了，遊戲結束
            if (collide(arena, player)) {
                alert('Game Over! 遊戲結束。點擊確定重新開始！');
                arena.forEach(row => row.fill(0)); // 清空地圖
                player.score = 0;
                player.lines = 0;
                updateScore();
            }
        }

        // 9. 旋轉矩陣邏輯
        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [ matrix[x][y], matrix[y][x] ] = [ matrix[y][x], matrix[x][y] ];
                }
            }
            if (dir > 0) { matrix.forEach(row => row.reverse()); } 
            else { matrix.reverse(); }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            // 旋轉時如果撞到牆壁，自動幫玩家往旁邊修正位置（Wall Kick）
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir); // 修正失敗，轉回來
                    player.pos.x = pos;
                    return;
                }
            }
        }

        // 10. 更新 UI 分數
        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('lines').innerText = player.lines;
        }

        // 11. 遊戲主循環
        let dropCounter = 0;
        let dropInterval = 800; // 基礎下落速度 (毫秒)
        let lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        // 12. 鍵盤監聽
        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) {        // 左箭頭
                playerMove(-1);
            } else if (event.keyCode === 39) { // 右箭頭
                playerMove(1);
            } else if (event.keyCode === 40) { // 下箭頭
                playerDrop();
            } else if (event.keyCode === 38 || event.keyCode === 32) { // 上箭頭 或 空白鍵
                playerRotate(1);
            }
        });

        // 初始化啟動
        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
